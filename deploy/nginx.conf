# /etc/nginx/sites-available/cinderellachat
# sudo ln -s /etc/nginx/sites-available/cinderellachat /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name cinderellachat.com www.cinderellachat.com;
    # certbot이 HTTPS 설정을 자동으로 추가합니다
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name cinderellachat.com www.cinderellachat.com;

    # certbot이 아래 줄을 자동으로 채워줍니다
    # ssl_certificate /etc/letsencrypt/live/cinderellachat.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/cinderellachat.com/privkey.pem;

    root /var/www/cinderellachat/client/dist;
    index index.html;

    # ── React SPA (모든 경로를 index.html로) ─────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API 요청 → Node.js 서버 (포트 4000) ──────────────────
    location /api/ {
        proxy_pass         http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Socket.IO WebSocket ────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── 정적 파일 캐시 ─────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # ── 보안 헤더 ─────────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN";
    add_header X-XSS-Protection      "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy       "strict-origin-when-cross-origin";
}
